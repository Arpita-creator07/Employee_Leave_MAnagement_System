<!DOCTYPE html>
<html>

<head>
<title>Login - Leave Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="login-body">

<div class="login-wrapper">


    <div class="login-left">
        <div class="login-left-content">
            <h2> Welcome! to</h2>
            <p>
             Our leave management system.
            </p>
        </div>

    </div>


    <div class="login-right">

        <h3 class="login-title">Login</h3>

        <p class="login-subtitle">
        Welcome! Please login to continue
        </p>

        <form id="loginForm" method="POST" action="/login">

            <label>Email</label>
            <input type="email" id="email" name="email" class="form-control" required>

            <label>Password</label>
            <input type="password" style="margin-bottom: 10%;" id="password" name="password" class="form-control" required>
            <toggle-password class="toggle-password" onclick="togglePasswordVisibility()">
                <i class="bi bi-eye-slash" id="toggleIcon"></i>
            </toggle-password>


            <button type="submit" class="btn btn-primary w-100">LOGIN</button>

        </form>

        <div class="login-links">
            <span>New User?</span>
            <a href="/register">Register</a>
        </div>

    </div>

</div>

</body>
</html>
